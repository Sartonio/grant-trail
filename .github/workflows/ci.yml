name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run unit tests
        env:
          CI: true
          VITE_SUPABASE_URL: https://dummy.supabase.co
          VITE_SUPABASE_KEY: dummy-key
        run: npm test

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Supabase
        run: |
          supabase start
          # Extract credentials and map them to GITHUB_ENV
          echo "VITE_SUPABASE_URL=$(supabase status -o env | grep API_URL | cut -d= -f2-)" >> $GITHUB_ENV
          echo "VITE_SUPABASE_KEY=$(supabase status -o env | grep ANON_KEY | cut -d= -f2-)" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o env | grep SERVICE_ROLE_KEY | cut -d= -f2-)" >> $GITHUB_ENV
        working-directory: .



      - name: Install Playwright browsers and dependencies
        run: npx playwright install --with-deps

      - name: Run Playwright E2E tests
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ env.VITE_SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run e2e

      - name: Upload Playwright E2E HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ./frontend/playwright-report/
          retention-days: 30
