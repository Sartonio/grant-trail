name: Deploy to Staging

# Deploys to the `staging` environment via the reusable deploy.yml.
#
# Policy: deploys are MANUAL ONLY (workflow_dispatch), by deliberate decision —
# not a temporary state. There is intentionally no `push` trigger here, matching
# the manual-only prod policy (deploy-prod.yml) and `vercel.json` disabling git
# deploys for main. To switch staging to auto-deploy on push to main, add a
# `push: { branches: [ main ] }` trigger; deploy.yml already serializes runs per
# environment via its `concurrency` group.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
    secrets: inherit
