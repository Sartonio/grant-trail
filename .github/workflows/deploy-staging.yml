name: Deploy to Staging

# Deploys to the `staging` environment via the reusable deploy.yml.
#
# Policy: deploys are MANUAL ONLY (workflow_dispatch), by deliberate decision —
# not a temporary state. There is intentionally no `push` trigger here, matching
# the manual-only prod policy (deploy-prod.yml) and `vercel.json` disabling git
# deploys for main. To switch staging to auto-deploy on push to main, add a
# `push: { branches: [ main ] }` trigger; deploy.yml already serializes runs per
# environment via its `concurrency` group.
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  # Gate the manual deploy on a green CI run for the exact commit being deployed.
  # This is defense-in-depth: main should ALSO have branch protection requiring
  # the CI/CD Pipeline (ci.yml) check to pass before merge.
  require-green-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Require a successful ci.yml run for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          count=$(gh api \
            "/repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&status=completed" \
            --jq '[.workflow_runs[] | select(.conclusion == "success")] | length')
          if [ "${count:-0}" -eq 0 ]; then
            echo "::error::No successful ci.yml run found for $SHA. Refusing to deploy."
            exit 1
          fi
          echo "Found $count successful ci.yml run(s) for $SHA."

  deploy:
    needs: require-green-ci
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
    secrets: inherit
