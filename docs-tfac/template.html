<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$title$</title>
$for(css)$
<link rel="stylesheet" href="$css$">
$endfor$
$for(header-includes)$
$header-includes$
$endfor$
<style>
/* === Reset === */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* === Layout === */
body {
  font-family: "Segoe UI", Arial, sans-serif;
  font-size: 11pt;
  line-height: 1.6;
  color: #1f2937;
  display: flex;
  min-height: 100vh;
}

/* === Sticky Sidebar TOC === */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 280px;
  height: 100vh;
  background: #f8faf9;
  border-right: 1px solid #d1fae5;
  overflow-y: auto;
  padding: 1.2em 0;
  z-index: 100;
}

.sidebar-header {
  padding: 0 1.2em 1em;
  border-bottom: 1px solid #d1fae5;
  margin-bottom: 0.8em;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 0.5em;
}

.sidebar-logo-img {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  flex-shrink: 0;
  border: none;
  box-shadow: none;
  padding: 0;
  margin: 0;
  cursor: default;
}

.sidebar-logo-text {
  font-size: 1.1em;
  font-weight: 700;
  color: #063F1E;
}

.sidebar-doc-title {
  font-size: 0.78em;
  color: #6b7280;
  line-height: 1.4;
}

.sidebar nav {
  padding: 0;
}

.sidebar nav a {
  display: block;
  padding: 0.35em 1.2em;
  font-size: 0.82em;
  color: #374151;
  font-weight: 500;
  text-decoration: none;
  border-left: 3px solid transparent;
  transition: background 0.15s, border-color 0.15s;
}

.sidebar nav a:hover {
  background: #ecfdf5;
  color: #063F1E;
}

.sidebar nav a.active {
  background: #d1fae5;
  border-left-color: #063F1E;
  color: #063F1E;
  font-weight: 600;
}

.sidebar nav a.toc-h3 {
  padding-left: 2.8em;
  font-size: 0.75em;
  color: #9ca3af;
  border-left: 3px solid transparent;
}

.sidebar nav a.toc-h3.active {
  color: #063F1E;
  background: #ecfdf5;
}

/* === Sidebar controls === */
.sidebar-controls {
  display: flex;
  gap: 0.4em;
  padding: 0.4em 1.2em 0.6em;
  border-bottom: 1px solid #d1fae5;
}

.sidebar-controls button {
  flex: 1;
  padding: 0.3em 0.5em;
  font-size: 0.72em;
  font-family: inherit;
  border: 1px solid #d1d5db;
  border-radius: 4px;
  background: #fff;
  color: #374151;
  cursor: pointer;
}

.sidebar-controls button:hover {
  background: #ecfdf5;
  border-color: #063F1E;
}

/* === Main content === */
.main-content {
  margin-left: 280px;
  flex: 1;
  max-width: 900px;
  padding: 2em 3em 4em;
}

/* === Persistent header === */
.doc-header {
  position: fixed;
  top: 0;
  left: 280px;
  right: 0;
  background: #063F1E;
  color: #fff;
  padding: 0.5em 2em;
  z-index: 90;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.85em;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}

.doc-header-title {
  font-weight: 600;
}

.doc-header-meta {
  color: #a7f3d0;
  font-size: 0.85em;
}

.main-content > *:first-child {
  margin-top: 3.5em; /* Space for fixed header */
}

/* === Headings === */
h1 {
  font-size: 1.8em;
  color: #063F1E;
  border-bottom: 2px solid #063F1E;
  padding-bottom: 0.3em;
  margin-bottom: 0.5em;
}

h2 {
  font-size: 1.4em;
  color: #063F1E;
  border-bottom: 1px solid #d1fae5;
  padding-bottom: 0.2em;
  margin-top: 2em;
  margin-bottom: 0.6em;
  scroll-margin-top: 4em;
}

h3 {
  font-size: 1.1em;
  color: #374151;
  margin-top: 1.2em;
  margin-bottom: 0.4em;
  scroll-margin-top: 4em;
}

/* === Collapsible sections === */
.collapsible-heading {
  cursor: pointer;
  user-select: none;
  position: relative;
}

.collapsible-heading::before {
  content: "\25BC";
  font-size: 0.6em;
  margin-right: 0.5em;
  display: inline-block;
  transition: transform 0.2s;
  vertical-align: middle;
}

.collapsible-heading.collapsed::before {
  transform: rotate(-90deg);
}

.collapsible-content {
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.collapsible-content.collapsed {
  max-height: 0 !important;
  overflow: hidden;
}

/* === Tables === */
table {
  border-collapse: collapse;
  width: 100%;
  margin: 12px 0;
  font-size: 0.92em;
}

table th, table td {
  border: 1px solid #d3d3d3;
  padding: 6px 10px;
  text-align: left;
}

table th {
  background-color: #f5f5f5;
  font-weight: 600;
}

/* === Images === */
img {
  border: 1px solid #d3d3d3;
  border-radius: 4px;
  padding: 4px;
  background: white;
  margin: 8px 0 12px;
  box-shadow: 0 0 2px rgba(0,0,0,0.1);
  display: block;
  max-width: 100%;
  height: auto;
  cursor: pointer;
  transition: opacity 0.15s;
}

img:hover {
  opacity: 0.85;
}

/* === Lightbox === */
.lightbox-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

.lightbox-overlay.active {
  display: flex;
}

.lightbox-overlay img {
  max-width: 90vw;
  max-height: 90vh;
  border: none;
  box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  border-radius: 6px;
  cursor: default;
  margin: 0;
  padding: 0;
}

.lightbox-close {
  position: fixed;
  top: 20px;
  right: 30px;
  color: #fff;
  font-size: 2em;
  cursor: pointer;
  z-index: 1001;
  background: none;
  border: none;
  line-height: 1;
}

/* === Blockquotes (callouts) === */
blockquote {
  border-left: 4px solid #d1fae5;
  background: #f0fdf4;
  margin: 1em 0;
  padding: 0.6em 1em;
  font-size: 0.95em;
  color: #374151;
  border-radius: 0 6px 6px 0;
}

/* === Code === */
code {
  background: #f3f4f6;
  padding: 0.15em 0.35em;
  border-radius: 3px;
  font-size: 0.9em;
}

/* === Lists === */
ul, ol { margin: 0.4em 0 0.4em 1.5em; }
li { margin-bottom: 0.2em; }

/* === Horizontal rule === */
hr {
  border: none;
  border-top: 1px solid #e5e7eb;
  margin: 1.5em 0;
}

/* === Links === */
a { color: #063F1E; text-decoration: none; }
a:hover { text-decoration: underline; }

/* === Back to top button === */
.back-to-top {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 42px;
  height: 42px;
  background: #063F1E;
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 1.3em;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  z-index: 200;
  transition: opacity 0.2s;
}

.back-to-top.visible {
  display: flex;
}

.back-to-top:hover {
  opacity: 0.85;
}

/* === Section nav (prev/next) === */
.section-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 2em;
  padding-top: 1em;
  border-top: 1px solid #e5e7eb;
  font-size: 0.88em;
}

.section-nav a {
  color: #063F1E;
  font-weight: 500;
}


/* === Footer === */
.doc-footer {
  margin-top: 3em;
  padding-top: 1em;
  border-top: 1px solid #d1fae5;
  font-size: 0.8em;
  color: #9ca3af;
  text-align: center;
}

/* === Print === */
@media print {
  .sidebar, .doc-header, .back-to-top, .section-nav { display: none !important; }
  .main-content { margin-left: 0; max-width: 100%; padding: 0; }
  .main-content > *:first-child { margin-top: 0; }
  .collapsible-content.collapsed { max-height: none !important; overflow: visible !important; }
  img { cursor: default; }
  h2 { page-break-after: avoid; }
  h3 { page-break-after: avoid; }
  img { page-break-inside: avoid; }
}

/* === Responsive: hide sidebar on small screens === */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .doc-header { left: 0; }
  .main-content { margin-left: 0; padding: 1em 1.5em 3em; }
}
</style>
</head>
<body>

<!-- Sidebar TOC -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <img class="sidebar-logo-img" src="images/logo.png" alt="GrantTrail" />
      <span class="sidebar-logo-text">GrantTrail</span>
    </div>
    <div class="sidebar-doc-title">$title$</div>
  </div>
  <div class="sidebar-controls">
    <button id="expandAll" title="Expand all sections">Expand All</button>
    <button id="collapseAll" title="Collapse all sections">Collapse All</button>
  </div>
  <nav id="tocNav">
    $table-of-contents$
  </nav>
</aside>

<!-- Fixed header -->
<div class="doc-header">
  <span class="doc-header-title">$title$</span>
  <span class="doc-header-meta">GrantTrail Documentation</span>
</div>

<!-- Main content -->
<div class="main-content" id="mainContent">
$body$

<div class="doc-footer">
  Generated from GrantTrail documentation.
</div>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">&times;</button>
  <img id="lightboxImg" src="" alt="Enlarged screenshot" />
</div>

<!-- Back to top -->
<button class="back-to-top" id="backToTop" title="Back to top">&uarr;</button>

<script>
(function() {
  // === Sidebar TOC: style pandoc-generated nested lists ===
  // Pandoc nests: ul > li(h1) > ul > li(h2) > ul > li(h3)
  // So h2 = depth 2, h3 = depth 3
  var tocNav = document.getElementById('tocNav');
  if (tocNav) {
    var allLinks = tocNav.querySelectorAll('a');
    allLinks.forEach(function(a) {
      var depth = 0;
      var el = a.parentElement;
      while (el && el !== tocNav) {
        if (el.tagName === 'UL') depth++;
        el = el.parentElement;
      }
      if (depth >= 3) a.classList.add('toc-h3');
    });
    // Hide the top-level h1 link (the document title)
    var firstLink = tocNav.querySelector('a');
    if (firstLink) firstLink.style.display = 'none';
    // Remove list styling
    var uls = tocNav.querySelectorAll('ul');
    uls.forEach(function(ul) {
      ul.style.listStyle = 'none';
      ul.style.padding = '0';
      ul.style.margin = '0';
    });
    // Also hide the "Table of Contents" link pandoc generates from the manual heading
    allLinks.forEach(function(a) {
      if (a.getAttribute('href') === '#table-of-contents') {
        a.style.display = 'none';
      }
    });
  }

  // === Active TOC highlight on scroll ===
  var headings = document.querySelectorAll('h2[id], h3[id]');
  var tocLinks = tocNav ? tocNav.querySelectorAll('a') : [];

  // Build a map of heading ID to its type (h2 or h3)
  var headingTypes = {};
  headings.forEach(function(h) { headingTypes[h.id] = h.tagName; });

  function updateActiveToc() {
    // Use a larger offset so clicking an h2 highlights it, not the previous h3
    var scrollPos = window.scrollY + 120;
    var current = null;
    headings.forEach(function(h) {
      if (h.offsetTop <= scrollPos) current = h;
    });
    tocLinks.forEach(function(a) {
      a.classList.remove('active');
      if (current && a.getAttribute('href') === '#' + current.id) {
        a.classList.add('active');
        // Scroll sidebar to keep active link visible
        var navRect = tocNav.getBoundingClientRect();
        var linkRect = a.getBoundingClientRect();
        if (linkRect.top < navRect.top || linkRect.bottom > navRect.bottom) {
          a.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
      }
    });
  }

  // Also update on hash navigation (clicking TOC links)
  window.addEventListener('scroll', updateActiveToc);
  window.addEventListener('hashchange', function() {
    setTimeout(updateActiveToc, 100);
  });
  updateActiveToc();

  // === Back to top ===
  var backBtn = document.getElementById('backToTop');
  window.addEventListener('scroll', function() {
    if (window.scrollY > 400) backBtn.classList.add('visible');
    else backBtn.classList.remove('visible');
  });
  backBtn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // === Lightbox ===
  var lightbox = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightboxImg');
  var lightboxClose = document.getElementById('lightboxClose');

  document.querySelectorAll('.main-content img').forEach(function(img) {
    img.addEventListener('click', function() {
      lightboxImg.src = this.src;
      lightbox.classList.add('active');
    });
  });

  lightbox.addEventListener('click', function(e) {
    if (e.target === lightbox || e.target === lightboxClose) {
      lightbox.classList.remove('active');
    }
  });

  lightboxClose.addEventListener('click', function() {
    lightbox.classList.remove('active');
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') lightbox.classList.remove('active');
  });

  // === Collapsible sections ===
  document.querySelectorAll('.main-content h2').forEach(function(h2) {
    // Skip the first h2 (usually title or quick reference)
    h2.classList.add('collapsible-heading');

    h2.addEventListener('click', function() {
      this.classList.toggle('collapsed');
      var next = this.nextElementSibling;
      while (next && next.tagName !== 'H2' && next.tagName !== 'HR') {
        if (this.classList.contains('collapsed')) {
          next.style.display = 'none';
        } else {
          next.style.display = '';
        }
        next = next.nextElementSibling;
      }
      // Also hide the HR after the section
      if (next && next.tagName === 'HR') {
        if (this.classList.contains('collapsed')) {
          next.style.display = 'none';
        } else {
          next.style.display = '';
        }
      }
    });
  });

  // === Expand All / Collapse All ===
  var allH2s = document.querySelectorAll('.main-content h2.collapsible-heading');

  document.getElementById('collapseAll').addEventListener('click', function() {
    allH2s.forEach(function(h2) {
      if (!h2.classList.contains('collapsed')) {
        h2.click();
      }
    });
  });

  document.getElementById('expandAll').addEventListener('click', function() {
    allH2s.forEach(function(h2) {
      if (h2.classList.contains('collapsed')) {
        h2.click();
      }
    });
  });


  // === Prev/Next section navigation ===
  var h2s = document.querySelectorAll('.main-content h2[id]');
  h2s.forEach(function(h2, i) {
    var nav = document.createElement('div');
    nav.className = 'section-nav';

    var prev = '';
    var next = '';

    if (i > 0) {
      prev = '<a href="#' + h2s[i-1].id + '">&larr; ' + h2s[i-1].textContent + '</a>';
    } else {
      prev = '<span></span>';
    }

    if (i < h2s.length - 1) {
      next = '<a href="#' + h2s[i+1].id + '">' + h2s[i+1].textContent + ' &rarr;</a>';
    } else {
      next = '<span></span>';
    }

    nav.innerHTML = prev + next;

    // Find the end of this section (before next h2 or end of content)
    var nextH2 = h2s[i+1];
    var insertBefore = nextH2 ? nextH2.previousElementSibling : null;

    // Walk backwards from next h2 to find the HR separator
    if (nextH2) {
      var sibling = nextH2.previousElementSibling;
      while (sibling && sibling.tagName === 'HR') {
        insertBefore = sibling;
        sibling = sibling.previousElementSibling;
      }
      insertBefore.parentElement.insertBefore(nav, insertBefore);
    } else {
      // Last section — append before footer
      var footer = mainContent.querySelector('.doc-footer');
      if (footer) footer.parentElement.insertBefore(nav, footer);
    }
  });

})();
</script>
</body>
</html>
